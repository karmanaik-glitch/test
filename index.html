<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#0B1120" id="tcm"/>
  <title>PharmAI | Clinical Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet"/>
  <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
<style>
/* ══ ULTRA-PREMIUM DESIGN SYSTEM ══ */
:root {
  --blue: #38BDF8; --blue-glow: rgba(56, 189, 248, 0.25);
  --indigo: #818CF8; --grad: linear-gradient(135deg, #38BDF8, #818CF8);
  --ok: #34D399; --warn: #FBBF24; --danger: #FB7185;
  --ff: "Inter", system-ui, sans-serif; --fm: "JetBrains Mono", monospace;
  --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275); --ease: cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  --bg: #020617; --surface: #0B1120; --card: rgba(30, 41, 59, 0.6);
  --text: #F8FAFC; --text-muted: #94A3B8; --border: rgba(255, 255, 255, 0.08);
  --glass: rgba(15, 23, 42, 0.7); background: var(--bg); color: var(--text);
  font-family: var(--ff); overflow: hidden; height: 100dvh; margin: 0;
}

body.light {
  --bg: #F8FAFC; --surface: #FFFFFF; --card: rgba(241, 245, 249, 0.9);
  --text: #0F172A; --text-muted: #64748B; --border: rgba(0, 0, 0, 0.06);
  --glass: rgba(255, 255, 255, 0.8);
}

.ms { font-family: "Material Symbols Rounded"; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; display: inline-block; -webkit-font-smoothing: antialiased; }

/* ══ LAYOUT ══ */
#ap { display: flex; height: 100dvh; width: 100vw; position: relative; }

/* Sidebar */
#sb {
  width: 300px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; transition: transform 0.4s var(--ease); z-index: 100;
}
@media (max-width: 1024px) { #sb { position: fixed; left: -300px; height: 100%; } #sb.open { transform: translateX(300px); } }

.sb-header { padding: 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 40px; height: 40px; background: var(--grad); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 16px var(--blue-glow); }
.logo-text { font-weight: 700; font-size: 1.2rem; letter-spacing: -0.02em; }

.sb-content { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; }
.sb-item {
  padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500;
}
.sb-item:hover { background: var(--card); color: var(--text); }
.sb-item.active { background: var(--blue-glow); color: var(--blue); border: 1px solid rgba(56, 189, 248, 0.15); }

/* Main Content */
.main-stage {
  flex: 1; display: flex; flex-direction: column; position: relative;
  background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.05), transparent),
              radial-gradient(circle at bottom left, rgba(129, 140, 248, 0.05), transparent);
}

header {
  padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
  background: var(--glass); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); z-index: 50;
}

.header-left { display: flex; align-items: center; gap: 16px; }
.menu-trigger { background: none; border: none; color: var(--text); cursor: pointer; display: none; }
@media (max-width: 1024px) { .menu-trigger { display: block; } }

.header-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.icon-btn:hover { background: var(--border); transform: translateY(-2px); }

/* Chat Area */
#chat {
  flex: 1; overflow-y: auto; padding: 40px 24px; display: flex; flex-direction: column; gap: 32px;
  max-width: 900px; margin: 0 auto; width: 100%; scroll-behavior: smooth;
}

.msg { display: flex; gap: 16px; max-width: 85%; animation: slideUp 0.5s var(--spring) both; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.avatar.ai { background: var(--grad); color: white; box-shadow: 0 4px 12px var(--blue-glow); }
.avatar.user { background: var(--border); color: var(--text-muted); }

.bubble { padding: 16px 20px; border-radius: 20px; font-size: 0.95rem; line-height: 1.6; position: relative; }
.msg.ai .bubble { background: var(--card); border: 1px solid var(--border); border-top-left-radius: 4px; }
.msg.user .bubble { background: var(--grad); color: white; border-top-right-radius: 4px; box-shadow: 0 8px 24px rgba(56, 189, 248, 0.2); }

/* AI Response Components */
.aic { margin-top: 12px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); background: rgba(15, 23, 42, 0.3); }
.ctag { padding: 12px 16px; background: var(--border); display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
.abody { padding: 16px; }

/* Input Area */
.input-container { padding: 24px; background: linear-gradient(to top, var(--bg), transparent); position: relative; }
.input-wrapper {
  max-width: 800px; margin: 0 auto; background: var(--glass); backdrop-filter: blur(24px);
  border: 1px solid var(--border); border-radius: 24px; display: flex; align-items: flex-end;
  padding: 8px 12px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); transition: all 0.3s var(--ease);
}
.input-wrapper:focus-within { border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-glow); }

#query { flex: 1; background: none; border: none; color: var(--text); padding: 12px; font-size: 1rem; font-family: var(--ff); resize: none; max-height: 200px; outline: none; }

.input-actions { display: flex; align-items: center; gap: 8px; padding-bottom: 4px; }
.send-btn {
  width: 44px; height: 44px; border-radius: 14px; background: var(--grad); border: none; color: white;
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
}
.send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px var(--blue-glow); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ══ WARD VIEW (DRAWER) ══ */
#cdss-view {
  position: fixed; right: -100%; top: 0; width: 100%; max-width: 600px; height: 100%;
  background: var(--surface); border-left: 1px solid var(--border); z-index: 200;
  transition: transform 0.5s var(--ease); display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0, 0, 0, 0.5);
}
#cdss-view.open { transform: translateX(-100%); }

.drawer-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.drawer-content { flex: 1; overflow-y: auto; padding: 24px; }

/* ══ THINKING STATE ══ */
.thinking { display: flex; gap: 4px; padding: 8px 0; }
.thinking span { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
.thinking span:nth-child(1) { animation-delay: -0.32s; }
.thinking span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

/* ══ SPLASH ══ */
#splash { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s var(--ease); }
.splash-logo { font-size: 64px; color: var(--blue); animation: pulse 2s infinite; }
@keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

/* ══ AUTH ══ */
#lp { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 24px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 32px; padding: 48px; width: 100%; max-width: 440px; text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5); }
.auth-input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 16px; padding: 16px; color: var(--text); margin-bottom: 16px; font-size: 1rem; outline: none; }
.auth-btn { width: 100%; padding: 16px; border-radius: 16px; background: var(--grad); color: white; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 8px; }

/* ══ UTILS ══ */
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo"><span class="ms">cardiology</span></div>
  <h1 style="margin-top: 24px; letter-spacing: -0.04em;">PharmAI</h1>
</div>

<div id="lp" class="hidden">
  <div class="auth-card">
    <div class="logo-icon" style="margin: 0 auto 24px; width: 64px; height: 64px;"><span class="ms" style="font-size: 32px;">cardiology</span></div>
    <h2 style="margin-bottom: 8px;">Welcome Back</h2>
    <p style="color: var(--text-muted); margin-bottom: 32px;">Sign in to access clinical intelligence.</p>
    <div id="auth-step">
      <input type="email" id="uname" class="auth-input" placeholder="Email address"/>
      <input type="password" id="ac" class="auth-input" placeholder="Password"/>
      <button class="auth-btn" onclick="doLogin()">Sign In</button>
      <button class="auth-btn" onclick="signInWithGoogle()" style="background: white; color: #1a1a1a; margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 12px;">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google Account
      </button>
    </div>
    <div id="name-step" class="hidden">
      <input type="text" id="display-name" class="auth-input" placeholder="Your Name"/>
      <button class="auth-btn" onclick="saveName()">Complete Setup</button>
    </div>
  </div>
</div>

<div id="ap" class="hidden">
  <aside id="sb">
    <div class="sb-header">
      <div class="logo-icon"><span class="ms">cardiology</span></div>
      <div class="logo-text">PharmAI</div>
    </div>
    <div class="sb-content" id="sbl"></div>
    <div style="padding: 16px; border-top: 1px solid var(--border);">
      <button class="sb-item" onclick="newChat()" style="width: 100%; background: var(--card); border: 1px solid var(--border);">
        <span class="ms">add</span> New Conversation
      </button>
    </div>
  </aside>

  <main class="main-stage">
    <header>
      <div class="header-left">
        <button class="menu-trigger" onclick="toggleSB()"><span class="ms">menu</span></button>
        <div id="current-chat-title" style="font-weight: 600; font-size: 0.95rem;">New Conversation</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleAppMode()"><span class="ms">local_hospital</span></button>
        <button class="icon-btn" onclick="openM('sm')"><span class="ms">settings</span></button>
        <div id="hpc" class="avatar ai" style="width: 32px; height: 32px; font-size: 0.8rem; font-weight: 700;">U</div>
      </div>
    </header>
    <div id="chat"></div>
    <div class="input-container">
      <div class="input-wrapper">
        <button class="icon-btn" style="border: none; background: none;" onclick="openCam()"><span class="ms">photo_camera</span></button>
        <textarea id="query" rows="1" placeholder="Ask about medications, dosages, or interactions..."></textarea>
        <div class="input-actions">
          <button class="icon-btn" style="border: none; background: none;" id="micbtn" onclick="toggleMic()"><span class="ms" id="micico">mic</span></button>
          <button class="send-btn" id="sbtn" onclick="sendQ()"><span class="ms">arrow_upward</span></button>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="cdss-view">
  <div class="drawer-header">
    <div style="display:flex; align-items:center; gap:12px;"><span class="ms" style="color:var(--blue)">local_hospital</span><h2 style="margin:0; font-size:1.2rem;">Ward Dashboard</h2></div>
    <button class="icon-btn" onclick="toggleAppMode()"><span class="ms">close</span></button>
  </div>
  <div class="drawer-content" id="pt-list-container"></div>
</div>

<div id="sm" class="hidden" style="position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px);">
  <div class="auth-card" style="max-width: 500px; text-align: left;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;"><h2 style="margin:0;">Settings</h2><button class="icon-btn" onclick="closeM('sm')"><span class="ms">close</span></button></div>
    <div style="margin-bottom:24px;"><label style="display:block; font-size:0.8rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px;">Appearance</label>
      <div style="display:flex; gap:8px;"><button class="sb-item" onclick="setTheme('light')" style="flex:1; justify-content:center;">Light</button><button class="sb-item" onclick="setTheme('dark')" style="flex:1; justify-content:center;">Dark</button></div>
    </div>
    <button class="auth-btn" style="background: var(--danger);" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<div id="cm" class="hidden" style="position:fixed; inset:0; z-index:2000; background:#000; display:flex; flex-direction:column;">
  <div style="padding:24px; display:flex; justify-content:space-between; align-items:center; color:#fff;"><h3>Scan Rx Label</h3><button class="icon-btn" onclick="closeCam()" style="background:rgba(255,255,255,0.1)"><span class="ms">close</span></button></div>
  <video id="video" autoplay playsinline style="flex:1; object-fit:cover;"></video>
  <div style="padding:24px;"><button id="snapbtn" class="auth-btn" onclick="capScan()">Capture & Extract</button></div>
  <canvas id="canvas" style="display:none;"></canvas>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script>
/* ══ AUDIO ENGINE ══ */
const SFX = {
  ctx: null, init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
  play(freq, type = 'sine', dur = 0.1, vol = 0.1) {
    if (!S.haptic) return; this.init(); const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime); gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur); osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime + dur);
  },
  tick() { this.play(800, 'sine', 0.05, 0.05); }, pop() { this.play(400, 'sine', 0.1, 0.1); }, chime() { this.play(660, 'sine', 0.2, 0.1); setTimeout(() => this.play(880, 'sine', 0.2, 0.1), 100); }
};

/* ══ FIREBASE & LOGIC ══ */
const firebaseConfig={apiKey:"AIzaSyAe1xX20eBj2Zb5HVZR3jsh7Aa1fp-mu_A",authDomain:"pharmai-38907.firebaseapp.com",projectId:"pharmai-38907",storageBucket:"pharmai-38907.firebasestorage.app",messagingSenderId:"1052723358649",appId:"1:1052723358649:web:612e0220af490ff6982468"};
firebase.initializeApp(firebaseConfig); const auth=firebase.auth(); const db=firebase.firestore();
const GROQ_MODEL='llama-3.3-70b-versatile'; let user=null, uName='', groqKey='', hist=[], sessions=[], currSess=null, S={haptic:true, theme:'auto'};

/* ══ AUTH ══ */
auth.onAuthStateChanged(async (fbUser) => {
  document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').classList.add('hidden'), 500);
  if (fbUser) {
    if (!fbUser.displayName) { document.getElementById('lp').classList.remove('hidden'); document.getElementById('auth-step').classList.add('hidden'); document.getElementById('name-step').classList.remove('hidden'); }
    else { user = fbUser.uid; uName = fbUser.displayName; document.getElementById('lp').classList.add('hidden'); document.getElementById('ap').classList.remove('hidden'); document.getElementById('hpc').textContent = uName[0].toUpperCase(); enterApp(); }
  } else { document.getElementById('lp').classList.remove('hidden'); }
});

async function doLogin() { const e=document.getElementById('uname').value, p=document.getElementById('ac').value; try { await auth.signInWithEmailAndPassword(e, p); SFX.chime(); } catch (err) { alert(err.message); } }
async function signInWithGoogle() { const p=new firebase.auth.GoogleAuthProvider(); await auth.signInWithPopup(p); }
async function saveName() { const n=document.getElementById('display-name').value; await auth.currentUser.updateProfile({ displayName: n }); location.reload(); }
async function doLogout() { await auth.signOut(); location.reload(); }

/* ══ APP LOGIC ══ */
async function enterApp() { const cfg = await db.collection('config').doc('keys').get(); groqKey = cfg.data().groq; loadSessions(); newChat(); }
async function loadSessions() { const d = await db.collection('users').doc(user).get(); sessions = d.exists ? d.data().sessions || [] : []; renderSB(); }
function renderSB() { const l = document.getElementById('sbl'); l.innerHTML = sessions.map(s => `<div class="sb-item ${currSess === s.id ? 'active' : ''}" onclick="loadChat(${s.id})"><span class="ms">chat_bubble</span><span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${s.title}</span></div>`).join(''); }
function newChat() { currSess = Date.now(); hist = []; document.getElementById('chat').innerHTML = `<div style="text-align:center; padding:60px 20px;"><h1>How can I help, ${uName}?</h1><p style="color:var(--text-muted);">Ask about medications, dosages, or interactions.</p></div>`; }
function loadChat(id) { const s = sessions.find(x => x.id === id); if (!s) return; currSess = id; hist = s.hist; document.getElementById('chat').innerHTML = s.html; SFX.tick(); }

async function sendQ() {
  const text = document.getElementById('query').value.trim(); if (!text) return;
  SFX.pop(); document.getElementById('query').value = ''; appendMsg('user', text); const skel = appendThinking();
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + groqKey },
      body: JSON.stringify({ model: GROQ_MODEL, messages: [{ role: 'system', content: 'You are PharmAI. Provide accurate clinical data. Format as JSON: {"category": "...", "summary": "...", "details": "..."}' }, ...hist, { role: 'user', content: text }], response_format: { type: 'json_object' } })
    });
    const data = await res.json(); const reply = JSON.parse(data.choices[0].message.content);
    skel.remove(); appendMsg('ai', reply); hist.push({ role: 'user', content: text }, { role: 'assistant', content: data.choices[0].message.content }); saveChat(); SFX.chime();
  } catch (e) { skel.remove(); appendErr(e.message); }
}

function appendMsg(role, data) {
  const chat = document.getElementById('chat'); if(chat.querySelector('div[style*="text-align:center"]')) chat.innerHTML='';
  const div = document.createElement('div'); div.className = `msg ${role}`;
  const content = typeof data === 'string' ? data : data.summary;
  div.innerHTML = `<div class="avatar ${role}"><span class="ms">${role === 'ai' ? 'cardiology' : 'person'}</span></div><div class="bubble">${role === 'ai' ? `<div class="aic"><div class="ctag">${data.category}</div><div class="abody">${data.details}</div></div>` : content}</div>`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}
function appendThinking() { const chat = document.getElementById('chat'); const div = document.createElement('div'); div.className = 'msg ai'; div.innerHTML = `<div class="avatar ai"><span class="ms">cardiology</span></div><div class="bubble" style="background:none; border:none;"><div class="thinking"><span></span><span></span><span></span></div></div>`; chat.appendChild(div); chat.scrollTop = chat.scrollHeight; return div; }
function appendErr(msg) { const chat = document.getElementById('chat'); const div = document.createElement('div'); div.className = 'msg ai'; div.innerHTML = `<div class="avatar ai"><span class="ms">error</span></div><div class="bubble" style="color:var(--danger)">${msg}</div>`; chat.appendChild(div); }
async function saveChat() { const title = hist[0].content.substring(0, 30) + '...'; const existing = sessions.find(s => s.id === currSess); if (existing) { existing.hist = hist; existing.html = document.getElementById('chat').innerHTML; } else { sessions.unshift({ id: currSess, title, hist, html: document.getElementById('chat').innerHTML }); } await db.collection('users').doc(user).set({ sessions }, { merge: true }); renderSB(); }

/* ══ UI UTILS ══ */
function toggleSB() { document.getElementById('sb').classList.toggle('open'); SFX.tick(); }
function toggleAppMode() { document.getElementById('cdss-view').classList.toggle('open'); SFX.pop(); }
function openM(id) { document.getElementById(id).classList.remove('hidden'); SFX.tick(); }
function closeM(id) { document.getElementById(id).classList.add('hidden'); }
function setTheme(m) { S.theme = m; document.body.classList.toggle('light', m === 'light'); SFX.tick(); }
function toggleSet(k) { S[k] = document.getElementById('hap-t').checked; SFX.tick(); }

/* ══ CAMERA & OCR ══ */
async function openCam(){ document.getElementById('cm').classList.remove('hidden'); try{ document.getElementById('video').srcObject=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}); }catch(e){ alert('Camera access denied.'); closeCam(); } }
function closeCam(){ const s=document.getElementById('video').srcObject; if(s)s.getTracks().forEach(t=>t.stop()); document.getElementById('video').srcObject=null; document.getElementById('cm').classList.add('hidden'); }
async function capScan(){ const c=document.getElementById('canvas'), v=document.getElementById('video'); c.width=v.videoWidth; c.height=v.videoHeight; c.getContext('2d').drawImage(v,0,0); try{ const r=await Tesseract.recognize(c,'eng'); document.getElementById('query').value=r.data.text.trim(); closeCam(); }catch(e){ alert('OCR failed.'); } }

document.getElementById('query').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQ(); } });
